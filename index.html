<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Twinkles CHEER DANCE | 板橋キッズチアダンス</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --pink: #ff9ad9;
      --gold: #ffd700;
      --text: #4a004a;
      --muted: #a86ca8;
      --bg-soft: #fff0f8;
      --radius: 16px;
      --shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background: #ffe6f5;
      overflow-x: hidden; /* ← 横ズレ防止 */
    }

    img { max-width: 100%; display: block; }

    header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,192,203,0.4);
      padding: 10px 20px;
      z-index: 50;
    }

    .header-inner {
      max-width: 1100px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav button {
      background: none;
      border: none;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--muted);
    }

    nav button:hover {
      background: rgba(255,182,193,0.3);
      color: var(--text);
    }

    .nav-cta {
      background: var(--pink);
      color: #fff;
    }

    section {
      padding: 70px 20px;
    }

    .inner {
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .lead {
      color: var(--muted);
      margin-bottom: 30px;
      line-height: 1.7;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr;
      text-align: center;
      padding-top: 80px;
    }

    .hero-title {
      font-size: 2.4rem;
      line-height: 1.3;
      margin-bottom: 16px;
    }

    .twinkles-hero {
      color: #ffffff;
      text-shadow: 0 0 6px #ff69b4, 0 0 12px #ffd700;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      margin-right: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--pink));
      color: #fff;
      box-shadow: var(--shadow);
    }

    .btn-ghost {
      background: #fff;
      border: 1px solid rgba(255,182,193,0.6);
      color: var(--pink);
    }

    .class-grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .class-card {
      background: #fff;
      padding: 30px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,192,203,0.4);
      width: 80%;
      max-width: 700px;
    }

    .class-card img {
      border-radius: var(--radius);
      margin-bottom: 10px;
    }

    .class-card-accent {
      background: linear-gradient(135deg, #fff7fa, #ffeef5);
      border-color: var(--pink);
    }

    .access-grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      width: 100%;
    }

    .access-box {
      border: 1px dashed var(--muted);
      padding: 20px;
      border-radius: var(--radius);
      text-align: center;
      color: var(--muted);
      background: #fff;
      width: calc(100% - 32px); /* ← スマホで左右余白確保 */
      max-width: 600px;
      margin: 0 auto;
    }

    .map-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: var(--radius);
    }

    .map-wrap iframe {
      width: 100%;
      height: 350px;
      border: 0;
      border-radius: var(--radius);
      display: block;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--muted);
      border-top: 1px solid rgba(255,192,203,0.4);
    }

    @media (max-width: 600px) {
      section { padding: 50px 16px; }
      .hero { padding-top: 40px; }
      .hero img { width: 85%; max-width: 320px; margin-bottom: 20px; }
      .hero-title { font-size: 1.8rem; }
      .lead { font-size: 0.95rem; line-height: 1.6; }

      .access-grid { flex-direction: column; gap: 30px; }
      .access-box { width: calc(100% - 32px); max-width: 100%; }
      .map-wrap iframe { height: 300px; }

      nav button { padding: 6px 10px; font-size: 0.8rem; }
      .class-card {
